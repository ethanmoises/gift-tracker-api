server:
  port: ${PORT:8080}

spring:
  application:
    name: gift

  datasource:
    url: jdbc:postgresql://postgres.railway.internal:5432/railway
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect