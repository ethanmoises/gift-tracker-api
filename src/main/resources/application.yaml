server:
  port: 9090

spring:
  application:
    name: gift

  datasource:
    url: jdbc:postgresql://localhost:5432/gift_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true