server:
  address: 0.0.0.0
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: gift

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html